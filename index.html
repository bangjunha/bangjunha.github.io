    <style>

            font-family: 'Nanum Brush script';
            font-size: 30px;
            text-shadow: 4px 4px 5px yellow;
            background-color: rgb(10, 234, 204);

        section{

        aside{

        aside li{
            margin-bottom: 40px;

        footer{

        }
        .clear{

        }
        #address{
            float: left;

            padding-left: 10px;
            font-family: 'Do Hyeon', sans-serif;
        }
        #customer{

        #page{

        a{
            text-decoration: none;
            color: black;
        }
        
    </style>
    <style>
        ul,li{
            list-style:none;
        }
        .slide{
            width:550px; 
            overflow:hidden;
        }
        .slide ul{
            width:calc(100% * 4);
            display:flex;
            animation:slide 20s infinite;
        } /* slide를 8초동안 진행하며 무한반복 함 */
        .slide li{
            width:calc(100% / 4);
            height:300px;
        }
        @keyframes slide {
            0% {margin-left:0;} /* 0 ~ 10  : 정지 */
          10% {margin-left:0;} /* 10 ~ 25 : 변이 */
          25% {margin-left:-100%;} /* 25 ~ 35 : 정지 */
          35% {margin-left:-100%;} /* 35 ~ 50 : 변이 */
          50% {margin-left:-200%;}
          60% {margin-left:-200%;}
          75% {margin-left:-300%;}
          85% {margin-left:-300%;}
          100% {margin-left:0;}
        }
      </style>
</head>
